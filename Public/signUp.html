<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>OptiScan - Sign Up </title>
    <link href="css/style.css" rel="stylesheet"> <!-- استدعاء الستايل بتاعك -->
    <style>
        .signup-box { max-width: 400px; margin: 100px auto; padding: 20px; border: 1px solid #ddd; border-radius: 10px; }
        .form-group { margin-bottom: 15px; }
        input { width: 100%; padding: 8px; margin-top: 5px; }
        button { width: 100%; padding: 10px; background: #333; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div class="signup-box">
        <h2 style="text-align: center;">Sign Up </h2>
        <form id="signupForm">
            <div class="form-group">
                <label> Name</label>
                <input type="string" id="name" required>
            </div>
            <div class="form-group">
                <label> Email</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label>Password </label>
                <input type="password" id="password" required>
            </div>
            <div class="form-group">
                <label> Phone</label>
                <input type="number" id="phone" required>
            </div>
            <div class="form-group">
                <label> Gender</label>
                <select id="gender" required>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                </select>
            </div>
            <div class="form-group">
                <label> Age</label>
                <input type="number" id="age" required>
            </div>
            <button type="submit">Enter</button>
        </form>
    </div>

    <script src="js/auth.js"></script> <!-- هنكريت الملف ده دلوقتي -->
</body>
</html>
