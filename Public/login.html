<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>OptiScan - Login </title>
    <link href="css/style.css" rel="stylesheet"> <!-- استدعاء الستايل بتاعك -->
    <style>
        .login-box { max-width: 400px; margin: 100px auto; padding: 20px; border: 1px solid #ddd; border-radius: 10px; }
        .form-group { margin-bottom: 15px; }
        input { width: 100%; padding: 8px; margin-top: 5px; }
        button { width: 100%; padding: 10px; background: #333; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2 style="text-align: center;">Login </h2>
        <form id="loginForm">
            <div class="form-group">
                <label> Email</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label>Password </label>
                <input type="password" id="password" required>
            </div>
            <button type="submit">Enter</button>
        </form>
    </div>

    <script src="js/auth.js"></script> <!-- هنكريت الملف ده دلوقتي -->
</body>
</html>
